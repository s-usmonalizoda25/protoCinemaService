syntax = "proto3";

package user.v1;

option go_package = "gen/user;userpb";



enum UserRole {
    USER_ROLE_UNSPECIFIED = 0;
    USER_ROLE_USER = 1;
    USER_ROLE_ADMIN = 2;
}





service UserService {
    rpc Add(CreateUserRequest) returns (CreateUserResponse);
    rpc GetByID(GetUserRequest) returns (GetUserResponse);
    rpc Update(UpdateUserRequest) returns (UpdateUserResponse);
    rpc Login(LoginRequest) returns (LoginResponse);
}



message CreateUserRequest {
    string name = 1;
    string email = 2;
    string phone = 3;
    string password = 4;
    int32 age = 5;
    UserRole role = 6;
}

message CreateUserResponse {
    int64 id = 1;
}

message GetUserRequest {
    int64 id = 1;
}

message GetUserResponse {
    int64 id = 1;
    string name = 2;
    string email = 3;
    string phone = 4;
    int32 age = 5;
    UserRole role = 6;
}

message UpdateUserRequest {
    int64 id = 1;
    string name = 2;
    string phone = 3;
}

message UpdateUserResponse {
    int32 code = 1;
    string message = 2;
}

message LoginRequest {
    string email = 1;
    string password = 2;
}

message LoginResponse {
    int64 id = 1;
    string access_token = 2;
    string refresh_token = 3;
    int32 role = 4;
}